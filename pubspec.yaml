name: pomelo
description: "a great project to learn flutter"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # 下载
  flutter_downloader: ^1.11.3
  # 网络库 https://github.com/flutterchina/dio
  dio: ^5.9.0
  # state
  flutter_riverpod: ^3.0.3
  # 缓存
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  # 路由管理
  go_router: ^14.6.2
  # JSON序列化
  json_annotation: ^4.9.0
  # 日志
  logger: ^2.4.0
  # 数据验证
  validators: ^3.0.0
  # 国际化
  intl: ^0.19.0
  # 权限管理
  permission_handler: ^11.3.1
  # 图片选择
  image_picker: ^1.1.2
  # 下拉刷新和上拉加载
  pull_to_refresh: ^2.0.0
  # Toast提示
  fluttertoast: ^9.0.0
  # 加载动画
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  # JSON序列化代码生成
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

