# Flutter 项目 CD 流水线（发布构建）
# 在创建 Release 或打 tag 时构建 release APK/AAB 并上传到 Release 附件
# 依赖 build.gradle.kts 中的 signingConfigs，需在仓库 Secrets 中配置签名信息
name: CD

on:
  release:
    types: [published]
  workflow_dispatch:  # 支持在 Actions 页面手动触发

jobs:
  build-release:
    name: 构建 Release 包
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 拉取依赖
        run: flutter pub get

      # 与 android/app/build.gradle.kts 中 signingConfigs 对应：storeFile = file("pomelo-release")
      - name: 准备签名 Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/pomelo-release
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: 构建 APK（已签名）
        run: flutter build apk --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 构建 App Bundle（已签名，用于 Google Play）
        run: flutter build appbundle --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 上传 APK 到 Release（仅在有 release 事件时）
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传产物为 Artifact（仅手动触发时，便于从 Actions 页下载）
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: release-builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
