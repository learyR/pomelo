# Flutter 项目 CI 流水线
# 在 push / pull_request 时自动：拉依赖、静态分析、单元测试
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-and-test:
    name: 分析 & 测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 拉取依赖
        run: flutter pub get

      - name: 代码分析
        run: flutter analyze --no-fatal-infos

      - name: 运行单元测试
        run: flutter test

  build-android:
    name: 构建 Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 拉取依赖
        run: flutter pub get

      - name: 构建 APK（Debug）
        run: flutter build apk --debug

      - name: 上传 APK 产物（可选，便于下载）
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
